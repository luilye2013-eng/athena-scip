<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena SCIP - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .login-container h1 { font-size: 28px; color: #0f172a; margin-bottom: 4px; }
        .login-container .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: #e2e8f0; color: #334155; margin-top: 8px; }
        .btn-secondary:hover { background: #cbd5e1; }
        .toggle-link { text-align: center; margin-top: 16px; font-size: 14px; color: #64748b; }
        .toggle-link a { color: #3b82f6; text-decoration: none; font-weight: 600; cursor: pointer; }
        .toggle-link a:hover { text-decoration: underline; }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .message.error { background: #fef2f2; color: #dc2626; display: block; }
        .message.success { background: #f0fdf4; color: #16a34a; display: block; }
        .message.info { background: #eff6ff; color: #2563eb; display: block; }
        .hidden { display: none !important; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            color: #0c4a6e;
            margin-bottom: 16px;
            display: none;
        }
        .info-box.show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔒 Athena SCIP</h1>
        <p class="subtitle">Supply Chain Intelligence Platform</p>

        <div id="infoBox" class="info-box">
            💡 You may need to check your email for confirmation after signing up.
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label for="signupEmail">Email address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••" required>
                <div style="font-size:11px;color:#94a3b8;margin-top:4px;">Password must be at least 8 characters</div>
            </div>
            <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
            <button type="button" class="btn btn-secondary" id="backToLoginBtn">← Back to Login</button>
        </form>

        <div class="toggle-link">
            <a id="toggleAction">Create an account</a>
        </div>

        <div class="footer">🔐 Secure authentication powered by Supabase</div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://catpprgdbvenutyyjqbx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ykiqckKEQw2m8XXvX4cGnQ_5ijzb7Py';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        console.log('🔑 Supabase initialized');

        let isSignupMode = false;

        // Get elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const toggleAction = document.getElementById('toggleAction');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        const messageDiv = document.getElementById('message');
        const infoBox = document.getElementById('infoBox');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }

        function hideMessage() {
            messageDiv.className = 'message';
            messageDiv.textContent = '';
        }

        function toggleMode() {
            isSignupMode = !isSignupMode;
            if (isSignupMode) {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                toggleAction.textContent = '← Back to Login';
                infoBox.classList.add('show');
                hideMessage();
            } else {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                toggleAction.textContent = 'Create an account';
                infoBox.classList.remove('show');
                hideMessage();
            }
        }

        // Toggle between login and signup
        toggleAction.addEventListener('click', toggleMode);
        backToLoginBtn.addEventListener('click', toggleMode);

        // LOGIN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            console.log('🔑 Attempting login for:', email);

            if (!email || !password) {
                showMessage('Please enter both email and password.', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('📡 Login response:', { data, error });

                if (error) {
                    let errorMsg = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = '❌ Invalid email or password. Please check and try again.';
                    } else if (error.message.includes('Email not confirmed')) {
                        errorMsg = '❌ Please confirm your email first. Check your inbox for the confirmation link.';
                    }
                    showMessage(errorMsg, 'error');
                } else {
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (err) {
                console.error('❌ Login error:', err);
                showMessage('An unexpected error occurred. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // SIGNUP
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            console.log('📝 Attempting signup for:', email);

            if (!email || !password) {
                showMessage('Please enter both email and password.', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters.', 'error');
                return;
            }

            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        emailRedirectTo: window.location.origin + '/secure-login.html'
                    }
                });

                console.log('📡 Signup response:', { data, error });

                if (error) {
                    showMessage('❌ ' + error.message, 'error');
                } else if (data.user) {
                    showMessage('✅ Account created! Check your email (including spam) for confirmation link.', 'success');
                    setTimeout(() => {
                        toggleMode();
                        document.getElementById('email').value = email;
                    }, 4000);
                } else {
                    showMessage('✅ Account created! Please check your email for confirmation.', 'success');
                }
            } catch (err) {
                console.error('❌ Signup error:', err);
                showMessage('An unexpected error occurred. Please try again.', 'error');
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create Account';
            }
        });

        // Check if already logged in
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                console.log('🔍 Session check:', session ? 'Logged in' : 'Not logged in');
                if (session) {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error('Session check error:', err);
            }
        }
        checkSession();
    </script>
</body>
</html>
