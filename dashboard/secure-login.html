<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena SCIP - Login</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- External JS -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    
    <style>
        /* Login-specific styles */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-container h1 {
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .login-container .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .message.error {
            background: #fef2f2;
            color: #dc2626;
            display: block;
        }
        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            display: block;
        }
        .hidden {
            display: none !important;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            color: #0c4a6e;
            margin-bottom: 16px;
            display: none;
        }
        .info-box.show {
            display: block;
        }
        .toggle-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }
        .toggle-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔒 Athena SCIP</h1>
        <p class="subtitle">Supply Chain Intelligence Platform</p>

        <div id="infoBox" class="info-box">
            💡 You may need to check your email for confirmation after signing up.
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label for="signupEmail">Email address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••" required>
                <div style="font-size:11px;color:#94a3b8;margin-top:4px;">Password must be at least 8 characters</div>
            </div>
            <button type="submit" class="btn-primary" id="signupBtn" style="width:100%;">Create Account</button>
            <button type="button" class="btn-secondary" id="backToLoginBtn" style="width:100%; margin-top:8px;">← Back to Login</button>
        </form>

        <div class="toggle-link">
            <a id="toggleAction">Create an account</a>
        </div>

        <div class="footer">🔐 Secure authentication powered by Supabase</div>
    </div>

    <!-- External JavaScript - ORDER MATTERS! -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="supabase-client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
</html>
