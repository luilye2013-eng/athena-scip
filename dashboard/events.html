<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena SCIP - Events</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- External JS -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
    <div class="header">
        <div>
            <h1>📰 Athena SCIP</h1>
            <p>Disruption Events</p>
            <div id="userInfo" style="font-size: 11px; margin-top: 4px;">Loading...</div>
        </div>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        <div class="nav">
            <a href="index.html" class="nav-btn">🏠 Home</a>
            <a href="recommendations.html" class="nav-btn">💡 Recommendations</a>
            <a href="events.html" class="nav-btn active">📰 Events</a>
            <a href="analytics.html" class="nav-btn">📊 Analytics</a>
        </div>
    </div>

    <div class="container">
        <div id="lastUpdated" class="last-updated">Loading data...</div>

        <!-- Summary -->
        <div class="card">
            <h3>📊 Summary</h3>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div><strong>Total Events:</strong> <span id="totalEvents">-</span></div>
                <div><strong>War:</strong> <span id="warCount">-</span></div>
                <div><strong>Natural Disasters:</strong> <span id="disasterCount">-</span></div>
                <div><strong>Other:</strong> <span id="otherCount">-</span></div>
            </div>
        </div>

    <!-- External JavaScript - ORDER MATTERS! -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="supabase-client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="events.js"></script>
</body>
</html>
